# Activity Specification Protocol — I Want
# Subject: Claude Shannon, Bell Labs researcher
# Date: December 1946

meta:
  schema_version: "1.0"
  spec_type: "i_want"
  spec_date: "1946-12-15"
  format: "activity-specification-protocol"
  context:
    situation: >
      Back at Bell Labs after wartime cryptography work. Age 30. The classified
      paper on secrecy systems is written but cannot be published yet. Research
      freedom restored. Surrounded by extraordinary colleagues — Hamming, Tukey,
      Brattain, Bardeen — but working mostly alone on a problem that has been
      forming since the 1937 master's thesis.
    what_comes_next: >
      Developing a general mathematical theory of communication. The core ideas —
      entropy as information measure, channel capacity, source coding — are taking
      shape as a unified framework. Needs a venue that reaches both mathematicians
      and communication engineers.
    hindsight_note: >
      "A Mathematical Theory of Communication" will be published in the Bell
      System Technical Journal, July and October 1948. It will create the field
      of information theory, define the bit, establish the noisy-channel coding
      theorem, and become one of the most cited scientific papers of the 20th
      century.

identity:
  name: "Claude Elwood Shannon"
  location: "Murray Hill, New Jersey"
  languages:
    - "English"

activity:
  one_line: "Formalize the mathematical structure of signal transmission, separating information content from physical medium and semantic meaning."
  description: >
    Develop a general theory of communication grounded in probability theory and
    mathematical rigor. Quantify information as reduction of uncertainty. Prove
    fundamental limits on how much information a noisy channel can carry, and how
    efficiently a source can be encoded — independent of what the messages mean
    or how the channel is physically implemented.
  method: >
    Mathematical abstraction from engineering problems. Take a specific
    communication channel — telegraph, telephone, teletype — strip away the
    physical implementation details and semantic content, keep only the
    mathematical structure. Build from definitions and axioms to theorems. Same
    method as the 1937 thesis: relay circuits ARE Boolean algebra. Now:
    communication IS entropy reduction.

positioning:
  core_distinction: "Treats communication as a mathematical problem about uncertainty, not an engineering problem about signals or a philosophical problem about meaning."
  comparison:
    - others: "Nyquist and Hartley studied specific telegraph and telephone channel properties."
      this_work: "Abstracts away the specific channel to find universal laws governing all communication."
    - others: "Wiener approaches stochastic processes from the continuous-signal filtering perspective."
      this_work: "Starts from discrete messages and probability distributions, then extends to continuous channels."
    - others: "Engineers optimize specific modulation schemes for specific channels."
      this_work: "Proves what is theoretically possible before asking how to achieve it in hardware."

