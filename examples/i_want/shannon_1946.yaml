intellectual_priors:
  - author: "George Boole"
    work: "An Investigation of the Laws of Thought (1854)"
    contribution: "Symbolic logic as a formal algebraic system — the foundation for seeing abstract structure in concrete systems."
  - author: "Harry Nyquist"
    work: "Certain Factors Affecting Telegraph Speed (1924)"
    contribution: "First quantitative relationship between transmission rate and channel bandwidth. Established that telegraph speed has mathematical limits."
  - author: "Ralph Hartley"
    work: "Transmission of Information (1928)"
    contribution: "Logarithmic measure of information. Showed that information quantity is proportional to the logarithm of the number of possible messages."
  - author: "Ludwig Boltzmann"
    work: "Statistical mechanics and the entropy concept (1870s)"
    contribution: "Entropy as a measure of disorder in statistical systems. The mathematical form H = -sum(p log p) connects thermodynamic entropy to probability distributions."
  - author: "Norbert Wiener"
    work: "Stochastic processes and statistical communication theory (ongoing)"
    contribution: "Contemporary influence. Rigorous treatment of random processes in continuous signals. Wiener's filtering theory addresses the continuous-channel case from a different angle."

origin:
  pattern: "Structural isomorphism between seemingly unrelated domains"
  description: >
    The 1937 master's thesis at MIT. Electrical relay circuits and Boolean algebra
    look like completely different subjects — one is physical hardware, the other is
    abstract logic. The insight was that they are structurally identical: every
    circuit has an algebraic expression, every algebraic expression has a circuit.
    This is the recurring method — find the abstract mathematical structure hiding
    inside a concrete engineering problem.
  core_lesson: "When two domains share the same formal structure, a theorem in one is automatically a theorem in the other."

credentials:
  education:
    - degree: "BS, Electrical Engineering"
      institution: "University of Michigan"
      year: 1936
    - degree: "MS, Electrical Engineering"
      institution: "Massachusetts Institute of Technology"
      year: 1937
    - degree: "PhD, Mathematics"
      institution: "Princeton University"
      year: 1940
  experience_arc: >
    National Research Fellow at the Institute for Advanced Study, Princeton
    (1940-1941). Joined Bell Telephone Laboratories in 1941 as a research
    mathematician. Wartime work on fire-control systems and cryptographic
    analysis. Now pursuing fundamental research in communication theory with
    full intellectual freedom.

collaboration:
  what_I_respond_to:
    - "Precisely formulated mathematical problems"
    - "Structural analogies between different domains"
    - "Engineering problems that conceal elegant mathematics"
    - "Puzzles and games with hidden formal structure"
  what_I_do_not_respond_to:
    - "Vague or open-ended questions without formal structure"
    - "Administrative obligations and committee work"
    - "Incremental engineering improvements without theoretical interest"
    - "Requests to explain intuitions before they are formalized"
  preferred_format:
    - "Written mathematical proofs"
    - "Technical memoranda"
    - "Blackboard derivations with one or two colleagues"
  channels:
    office: "Bell Telephone Laboratories, Murray Hill, NJ"

active_work:
  - topic: "Mathematical theory of communication"
    status: "in_progress"
    need: >
      A publication venue that reaches both mathematicians and communication
      engineers simultaneously. The theory is too mathematical for pure
      engineering journals and too applied for pure mathematics journals.
  - topic: "Entropy as information measure"
    status: "in_progress"
    need: >
      Peer review from mathematicians who understand both probability theory
      and communication engineering — colleagues who can verify the axiomatics
      and appreciate the engineering implications.
  - topic: "Channel capacity theorem"
    status: "in_progress"
    need: >
      Proof that reliable communication is possible at any rate below channel
      capacity. The existence proof is forming but the constructive coding
      schemes remain open.
