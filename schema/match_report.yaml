# Activity Specification Protocol — Match Report Schema
# Version: 1.0
# Type: Compatibility analysis output (produced by ASP-02 prompt)
# License: MIT
#
# This schema defines the output of a structured compatibility evaluation
# between one i_want spec and one i_need spec. The report is generated by
# an LLM using the ASP-02 matching prompt.

meta:
  schema_version: "1.0"
  report_type: "match_report"
  date: "YYYY-MM-DD"
  spec_a:                          # the i_want spec
    file: ""
    name: ""
    one_line: ""
  spec_b:                          # the i_need spec
    file: ""
    name: ""
    one_line: ""

# DOES A HAVE WHAT B NEEDS? DOES B HAVE WHAT A NEEDS?
complementarity:
  score: ""                        # high | medium | low | conflict
  a_needs_b_has:                   # what the person needs that the org offers
    - a_need: ""
      b_offers: ""
      match_quality: ""            # direct | adjacent | partial
  b_needs_a_has:                   # what the org needs that the person has
    - b_need: ""
      a_offers: ""
      match_quality: ""
  gaps:                            # unmet needs from either side
    - side: ""                     # a | b
      unmet_need: ""
      severity: ""                 # blocking | manageable | minor

# CAN THEY ACTUALLY WORK TOGETHER?
method_compatibility:
  score: ""                        # compatible | adaptable | incompatible
  strengths: []                    # what works naturally
  friction_points: []              # what needs negotiation

# DO THEY THINK IN COMPATIBLE WAYS?
intellectual_alignment:
  score: ""                        # convergent | complementary | orthogonal | contradictory
  shared_priors: []                # intellectual priors both reference
  unique_to_a: []                  # priors only A has
  unique_to_b: []                  # priors only B has (or institutional knowledge)
  note: ""                         # qualitative assessment

# ARE THEY SOLVING THE SAME PROBLEM FROM COMPATIBLE ANGLES?
positioning:
  score: ""                        # complementary | overlapping | competing
  synergy_areas: []                # where combined work > sum of parts
  tension_areas: []                # where framing conflicts exist

# WHAT SHOULD HAPPEN NEXT?
recommendation:
  fit: ""                          # strong | moderate | weak | poor
  collaboration_type: ""           # autonomous_research | directed_project | co_development | advisory | not_recommended
  concrete_first_step: ""          # specific action both could take
  risks: []                        # what could go wrong
  hindsight_verdict: ""            # for historical demos only — what actually happened
